<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cairn Field">
<title>Cairn Partners — Field Map</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --stone:#2C2416;--gold:#C09000;--cream:#F5F0E8;
  --slate:#4A4A4A;--panel:#FDFAF4;--border:#DDD5C0;
  --t1:#1a7a3c;--t2:#2980b9;--t3:#e67e22;--t4:#95a5a6;
  --listed:#8B1A8B;--fire:#C0392B;
  --yes:#27AE60;--no:#C0392B;--maybe:#E67E22;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--stone);}
.header{position:fixed;top:0;left:0;right:0;z-index:1000;background:var(--stone);padding:calc(var(--safe-top) + 10px) 16px 10px;border-bottom:1px solid rgba(192,144,0,0.3);display:flex;align-items:center;justify-content:space-between;}
.header-logo{display:flex;align-items:center;gap:8px;}
.header-logo h1{font-family:"Playfair Display",serif;font-size:16px;color:var(--gold);}
.header-logo span{font-size:8px;color:rgba(245,240,232,0.5);letter-spacing:1.5px;text-transform:uppercase;display:block;}
.header-actions{display:flex;gap:8px;}
.hbtn{padding:7px 12px;border-radius:20px;border:none;font-family:"DM Sans",sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:all 0.15s;}
.hbtn-near{background:var(--gold);color:var(--stone);}
.hbtn-list{background:rgba(255,255,255,0.1);color:var(--cream);}
.hbtn-list.active{background:rgba(255,255,255,0.2);}
.layer-bar{position:fixed;top:62px;left:0;right:0;z-index:999;padding:6px 12px;display:flex;gap:5px;overflow-x:auto;background:rgba(44,36,22,0.95);border-bottom:1px solid rgba(192,144,0,0.15);scrollbar-width:none;}
.layer-bar::-webkit-scrollbar{display:none;}
.lbtn{padding:4px 10px;border-radius:20px;border:1px solid rgba(255,255,255,0.2);font-size:10px;font-weight:600;cursor:pointer;font-family:"DM Sans",sans-serif;white-space:nowrap;color:rgba(255,255,255,0.6);background:transparent;transition:all 0.15s;flex-shrink:0;}
.lbtn.on{color:white;border-color:transparent;}
.lbtn[data-tier="1"].on{background:var(--t1);}
.lbtn[data-tier="2"].on{background:var(--t2);}
.lbtn[data-tier="3"].on{background:var(--t3);}
.lbtn[data-tier="4"].on{background:var(--t4);}
.lbtn[data-tier="listed"].on{background:var(--listed);}
.lbtn[data-tier="fire"].on{background:var(--fire);}
#map{position:fixed;top:103px;left:0;right:0;bottom:calc(var(--safe-bottom) + 60px);z-index:1;}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;padding:8px 16px calc(var(--safe-bottom) + 8px);background:var(--stone);border-top:1px solid rgba(192,144,0,0.2);display:flex;gap:6px;z-index:1000;}
.nav-stat{flex:1;background:rgba(255,255,255,0.06);border-radius:8px;padding:6px 4px;text-align:center;}
.nav-stat-num{font-family:"Playfair Display",serif;font-size:16px;line-height:1;}
.nav-stat-lbl{font-size:8px;color:rgba(245,240,232,0.5);text-transform:uppercase;letter-spacing:1px;margin-top:1px;}
.list-panel{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--panel);z-index:2000;transform:translateX(100%);transition:transform 0.3s ease;display:flex;flex-direction:column;padding-top:calc(var(--safe-top) + 0px);}
.list-panel.open{transform:translateX(0);}
.list-header{padding:14px 16px 10px;background:var(--stone);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.list-header h2{font-family:"Playfair Display",serif;font-size:16px;color:var(--gold);}
.list-close{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,0.1);border:none;color:var(--cream);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.list-search{padding:10px 16px;background:var(--cream);border-bottom:1px solid var(--border);flex-shrink:0;}
.list-search input{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:20px;font-family:"DM Sans",sans-serif;font-size:13px;background:white;color:var(--stone);outline:none;}
.list-items{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.list-item{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;gap:10px;align-items:center;cursor:pointer;}
.list-item:active{background:#EDE8DC;}
.list-item.fire-item{border-left:3px solid var(--fire);}
.list-item.listed-item{border-left:3px solid var(--listed);}
.li-badge{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:white;flex-shrink:0;}
.li-info{flex:1;min-width:0;}
.li-name{font-size:13px;font-weight:600;color:var(--stone);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.li-sub{font-size:11px;color:var(--slate);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.li-tags{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap;}
.tag{font-size:9px;padding:2px 6px;border-radius:3px;font-weight:500;}
.tag-score{background:rgba(0,0,0,0.06);color:#555;}
.tag-price{background:rgba(139,26,139,0.1);color:#6B0A6B;}
.tag-cf{background:rgba(39,174,96,0.1);color:#1a5c30;}
.tag-yes{background:rgba(39,174,96,0.15);color:#1a5c30;}
.tag-no{background:rgba(192,57,43,0.15);color:#7a1a1a;}
.tag-maybe{background:rgba(230,126,34,0.15);color:#7a4a10;}
.detail-sheet{position:fixed;bottom:0;left:0;right:0;background:var(--panel);border-radius:20px 20px 0 0;box-shadow:0 -4px 30px rgba(0,0,0,0.25);z-index:3000;transform:translateY(100%);transition:transform 0.35s cubic-bezier(0.32,0.72,0,1);max-height:92vh;display:flex;flex-direction:column;padding-bottom:calc(var(--safe-bottom) + 0px);}
.detail-sheet.open{transform:translateY(0);}
.sheet-handle{width:36px;height:4px;border-radius:2px;background:var(--border);margin:10px auto 0;flex-shrink:0;}
.sheet-header{padding:12px 20px 10px;flex-shrink:0;display:flex;align-items:flex-start;justify-content:space-between;}
.sheet-score{display:flex;align-items:center;gap:10px;}
.score-circle{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:"Playfair Display",serif;font-size:20px;font-weight:700;color:white;flex-shrink:0;}
.sheet-name{font-family:"Playfair Display",serif;font-size:16px;color:var(--stone);line-height:1.3;}
.sheet-addr{font-size:11px;color:var(--slate);margin-top:3px;}
.sheet-close{width:28px;height:28px;border-radius:50%;background:var(--border);border:none;font-size:14px;cursor:pointer;color:var(--stone);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-left:8px;}
.sheet-body{overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 20px 20px;flex:1;}
.action-row{display:flex;gap:8px;margin-bottom:14px;}
.action-btn{flex:1;padding:12px 8px;border-radius:12px;border:none;font-family:"DM Sans",sans-serif;font-size:12px;font-weight:600;cursor:pointer;text-align:center;text-decoration:none;display:flex;flex-direction:column;align-items:center;gap:3px;transition:all 0.15s;}
.action-btn span.icon{font-size:18px;}
.action-btn span.lbl{font-size:10px;}
.btn-call{background:#E8F8F0;color:#1a5c30;}
.btn-dir{background:#EBF3FB;color:#1a4a7a;}
.btn-listing{background:#F0E8F8;color:#4a1a6b;}
.ynm-section{margin-bottom:14px;}
.ynm-label{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--slate);margin-bottom:8px;}
.ynm-row{display:flex;gap:8px;}
.ynm-btn{flex:1;padding:12px 8px;border-radius:12px;border:2px solid transparent;font-family:"DM Sans",sans-serif;font-size:13px;font-weight:700;cursor:pointer;text-align:center;transition:all 0.15s;background:var(--cream);color:var(--slate);}
.ynm-btn.selected-yes{background:var(--yes);color:white;border-color:var(--yes);}
.ynm-btn.selected-no{background:var(--no);color:white;border-color:var(--no);}
.ynm-btn.selected-maybe{background:var(--maybe);color:white;border-color:var(--maybe);}
.notes-section{margin-bottom:14px;}
.notes-label{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--slate);margin-bottom:6px;}
.notes-input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:10px;font-family:"DM Sans",sans-serif;font-size:13px;background:white;color:var(--stone);resize:none;outline:none;min-height:70px;}
.notes-input:focus{border-color:var(--gold);}
.save-btn{width:100%;padding:14px;border-radius:12px;background:var(--gold);color:var(--stone);border:none;font-family:"DM Sans",sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.15s;}
.save-btn.saved{background:var(--yes);}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.info-field{background:var(--cream);border-radius:8px;padding:8px 10px;}
.info-lbl{font-size:9px;color:var(--slate);text-transform:uppercase;letter-spacing:0.8px;}
.info-val{font-size:12px;font-weight:600;color:var(--stone);margin-top:2px;}
.info-val.good{color:var(--yes);}.info-val.warn{color:var(--maybe);}.info-val.bad{color:var(--no);}
.sec-title{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--slate);margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border);}
.steve-banner{background:var(--fire);color:white;padding:10px 12px;border-radius:10px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px;margin-bottom:12px;}
.nearby-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer;}
.nearby-item:last-child{border-bottom:none;}
.nearby-badge{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:10px;color:white;flex-shrink:0;}
.nearby-name{font-size:12px;font-weight:600;color:var(--stone);}
.nearby-dist{font-size:10px;color:var(--slate);}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--stone);color:var(--cream);padding:10px 20px;border-radius:20px;font-size:12px;font-weight:500;opacity:0;transition:all 0.3s;z-index:9999;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,0.3);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>

let activeTiers=new Set(['1','2','3','4','listed','fire']);
let statusMap={};
let currentTarget=null,currentType=null;
let userLat=null,userLng=null;
let gmap=null;
let markers=[];

try{const s=localStorage.getItem('cairn_status');if(s)statusMap=JSON.parse(s);}catch(e){}

function saveStatus(){
  try{localStorage.setItem('cairn_status',JSON.stringify(statusMap));}catch(e){}
  updateBottomNav();
}

function sc(s){
  if(s>=55)return'#1a7a3c';if(s>=40)return'#2980b9';
  if(s>=25)return'#e67e22';if(s>=0)return'#95a5a6';return'#c0392b';
}
function getTier(s){if(s>=55)return'1';if(s>=40)return'2';if(s>=25)return'3';return'4';}
function tierLabel(s){
  if(s>=55)return'Tier 1 — Priority';if(s>=40)return'Tier 2 — Strong';
  if(s>=25)return'Tier 3 — Watch';return'Tier 4 — Low';
}
function dist(la1,lo1,la2,lo2){
  const R=3959,dLa=(la2-la1)*Math.PI/180,dLo=(lo2-lo1)*Math.PI/180;
  const a=Math.sin(dLa/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLo/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function initMap(){
  gmap=new google.maps.Map(document.getElementById('map'),{
    center:{lat:29.76,lng:-95.37},zoom:11,
    mapTypeId:'roadmap',
    styles:[
      {featureType:'poi',elementType:'labels',stylers:[{visibility:'off'}]},
      {featureType:'transit',stylers:[{visibility:'off'}]}
    ],
    disableDefaultUI:true,
    zoomControl:true,
    gestureHandling:'greedy'
  });
  makeMarkers();
  updateBottomNav();
}

function makeMarkers(){
  markers.forEach(m=>m.setMap(null));
  markers=[];

  UD.forEach((d,idx)=>{
    const tier=getTier(d.score);
    if(!activeTiers.has(tier))return;
    const color=sc(d.score).replace('#','');
    const st=statusMap['u_'+idx];
    const border=st?(st.status==='yes'?'27AE60':st.status==='no'?'C0392B':'E67E22'):'FFFFFF';
    const size=d.score>=55?22:d.score>=40?18:14;
    const icon={
      url:'https://chart.googleapis.com/chart?chst=d_map_pin_letter&chld='+d.score+'|'+color+'|'+border,
      scaledSize:new google.maps.Size(size*1.5,size*2),
      anchor:new google.maps.Point(size*0.75,size*2)
    };
    const mk=new google.maps.Marker({
      position:{lat:d.lat,lng:d.lng},
      map:gmap,icon,title:d.name,zIndex:d.score
    });
    mk.addListener('click',()=>openUnlisted(idx));
    markers.push(mk);
  });

  LD.forEach((d,idx)=>{
    const isFire=d.steves_list;
    const tierKey=isFire?'fire':'listed';
    if(!activeTiers.has(tierKey))return;
    const emoji=isFire?'🔥':'🏷';
    const mk=new google.maps.Marker({
      position:{lat:d.lat,lng:d.lng},
      map:gmap,
      label:{text:emoji,fontSize:'18px'},
      title:d.name,
      zIndex:isFire?1000:500
    });
    mk.addListener('click',()=>openListed(idx));
    markers.push(mk);
  });
}

function findNearMe(){
  navigator.geolocation.getCurrentPosition(pos=>{
    userLat=pos.coords.latitude;
    userLng=pos.coords.longitude;
    gmap.setCenter({lat:userLat,lng:userLng});
    gmap.setZoom(13);
    new google.maps.Marker({
      position:{lat:userLat,lng:userLng},
      map:gmap,
      icon:{path:google.maps.SymbolPath.CIRCLE,scale:8,fillColor:'#2980b9',fillOpacity:1,strokeColor:'white',strokeWeight:2},
      title:'You are here',zIndex:9999
    });
    showToast('Showing your location');
  },()=>showToast('Location access denied'));
}

function getNearby(lat,lng,exIdx,exType,n=4){
  return UD.map((d,i)=>({...d,idx:i,d:dist(lat,lng,d.lat,d.lng)}))
    .filter(d=>!(exType==='unlisted'&&d.idx===exIdx))
    .sort((a,b)=>a.d-b.d).slice(0,n);
}

function openUnlisted(idx){
  const d=UD[idx];
  currentTarget=idx;currentType='unlisted';

  const color=sc(d.score);

  html+='</div>';

  html+='<div class="sec-title">Business Info</div>';

  html+='<div class="info-field"><div class="info-lbl">Rating</div><div class="info-val '+(d.rating>=4?'good':d.rating>=3.5?'warn':'bad')+'">⭐ '+(d.rating||'N/A')+'</div></div>';

  html+='<div class="info-field"><div class="info-lbl">Wash & Fold</div><div class="info-val '+(d.wash_fold==='Yes'?'good':'warn')+'">'+d.wash_fold+'</div></div>';
  html+='<div class="info-field"><div class="info-lbl">Website</div><div class="info-val '+(hw?'good':'warn')+'">'+(hw?'Yes':'No')+'</div></div>';
  html+='<div class="info-field"><div class="info-lbl">Tier</div><div class="info-val" style="color:'+color+'">'+tierLabel(d.score)+'</div></div>';
  html+='</div>';

  if(d.phone){
    html+='<div class="sec-title">Phone</div>';
    html+='<div style="font-size:13px;color:var(--slate);margin-bottom:14px;padding:8px 10px;background:var(--cream);border-radius:8px;">'+d.phone+'</div>';
  }

  var yc=st.status==="yes"?" selected-yes":"";
  var mc=st.status==="maybe"?" selected-maybe":"";
  var nc=st.status==="no"?" selected-no":"";
  html+='<div class="ynm-section"><div class="ynm-label">Field Assessment</div><div class="ynm-row">';
  html+='<button class="ynm-btn'+yc+'" data-action="yes">✅ Yes</button>';
  html+='<button class="ynm-btn'+mc+'" data-action="maybe">🤔 Maybe</button>';
  html+='<button class="ynm-btn'+nc+'" data-action="no">❌ No</button>';
  html+='</div></div>';

  html+='<div class="notes-section"><div class="notes-label">Field Notes</div>';
  html+='<textarea class="notes-input" id="notes-input" placeholder="What did you observe?">'+(st.notes||'')+'</textarea></div>';
  html+='<button class="save-btn" id="save-btn" onclick="saveEntry()">💾 Save to Pipeline</button>';

  if(nearby.length>0){
    html+='<div style="margin-top:16px"><div class="sec-title">Nearby Laundromats</div>';
    nearby.forEach(n=>{
      html+='<div class="nearby-item" onclick="openUnlisted('+n.idx+')">';
      html+='<div class="nearby-badge" style="background:'+sc(n.score)+'">'+n.score+'</div>';
      html+='<div><div class="nearby-name">'+n.name+'</div><div class="nearby-dist">'+n.d.toFixed(1)+' mi away</div></div></div>';
    });
    html+='</div>';
  }

  document.getElementById('sheet-body').innerHTML=html;
  document.getElementById('detail-sheet').classList.add('open');
  gmap.panTo({lat:d.lat,lng:d.lng});
}

function setStatus(status){
  const key=(currentType==='unlisted'?'u_':'l_')+currentTarget;
  if(!statusMap[key])statusMap[key]={};
  statusMap[key].status=status;
  saveStatus();
  document.querySelectorAll('.ynm-btn').forEach(b=>{
    b.className='ynm-btn';
    const txt=b.textContent;
    if((txt.includes('Yes')||txt.includes('Pursue'))&&status==='yes')b.classList.add('selected-yes');
    else if((txt.includes('Maybe')||txt.includes('Research'))&&status==='maybe')b.classList.add('selected-maybe');
    else if((txt.includes('No')||txt.includes('Pass'))&&status==='no')b.classList.add('selected-no');
  });
  makeMarkers();
  showToast(status==='yes'?'✅ Marked Yes':status==='maybe'?'🤔 Marked Maybe':'❌ Marked No');
}

function saveEntry(){
  const key=(currentType==='unlisted'?'u_':'l_')+currentTarget;
  const notes=document.getElementById('notes-input')?.value||'';
  if(!statusMap[key])statusMap[key]={};
  statusMap[key].notes=notes;
  saveStatus();
  const btn=document.getElementById('save-btn');
  btn.textContent='✅ Saved!';btn.className='save-btn saved';
  showToast('Saved to pipeline');
  setTimeout(()=>{if(btn){btn.textContent='💾 Save to Pipeline';btn.className='save-btn';}},2500);
}

function toggleList(){
  const p=document.getElementById('list-panel');
  const b=document.getElementById('list-btn');
  const open=p.classList.contains('open');
  p.classList.toggle('open');b.classList.toggle('active',!open);
  if(!open)renderListItems();
}

function renderListItems(){
  const c=document.getElementById('list-items');
  const s=document.getElementById('list-search').value.toLowerCase();
  c.innerHTML='';

  LD.filter(d=>d.steves_list).forEach(d=>{
    if(s&&!d.name.toLowerCase().includes(s))return;
    const idx=LD.indexOf(d);
    const el=document.createElement('div');
    el.className='list-item fire-item';
    el.innerHTML='<div class="li-badge" style="background:#C0392B;font-size:18px">🔥</div>'+
      '<div class="li-info"><div class="li-name">'+d.name+'</div><div class="li-sub">'+d.location+'</div>'+
      '<div class="li-tags">'+(d.asking_price?'<span class="tag tag-price">'+d.asking_price+'</span>':'')+
      (d.cash_flow?'<span class="tag tag-cf">'+d.cash_flow+'</span>':'')+'</div></div>';
    el.onclick=()=>{openListed(idx);toggleList();};
    c.appendChild(el);
  });

  LD.filter(d=>!d.steves_list).forEach(d=>{
    if(s&&!d.name.toLowerCase().includes(s))return;
    const idx=LD.indexOf(d);
    const el=document.createElement('div');
    el.className='list-item listed-item';
    el.innerHTML='<div class="li-badge" style="background:#8B1A8B;font-size:14px">🏷</div>'+
      '<div class="li-info"><div class="li-name">'+d.name+'</div><div class="li-sub">'+d.location+'</div>'+
      '<div class="li-tags">'+(d.asking_price?'<span class="tag tag-price">'+d.asking_price+'</span>':'')+'</div></div>';
    el.onclick=()=>{openListed(idx);toggleList();};
    c.appendChild(el);
  });

  [...UD].map((d,i)=>({...d,idx:i})).sort((a,b)=>b.score-a.score).forEach(d=>{
    if(s&&!d.name.toLowerCase().includes(s)&&!d.address.toLowerCase().includes(s))return;
    const key='u_'+d.idx;const st=statusMap[key];
    const el=document.createElement('div');
    el.className='list-item';
    const stTag=st?.status?'<span class="tag tag-'+st.status+'">'+(st.status==='yes'?'✅ Yes':st.status==='no'?'❌ No':'🤔 Maybe')+'</span>':'';
    el.innerHTML='<div class="li-badge" style="background:'+sc(d.score)+'">'+d.score+'</div>'+
      '<div class="li-info"><div class="li-name">'+d.name+'</div><div class="li-sub">'+d.address+'</div>'+
      '<div class="li-tags"><span class="tag tag-score">'+tierLabel(d.score)+'</span>'+stTag+'</div></div>';
    el.onclick=()=>{openUnlisted(d.idx);toggleList();};
    c.appendChild(el);
  });
}

function filterList(){renderListItems();}
function closeSheet(){document.getElementById('detail-sheet').classList.remove('open');currentTarget=null;currentType=null;}

function updateBottomNav(){
  document.getElementById('bn-t1').textContent=UD.filter(d=>d.score>=55).length;
  document.getElementById('bn-fire').textContent=LD.filter(d=>d.steves_list).length;
  const sv=Object.values(statusMap);
  document.getElementById('bn-yes').textContent=sv.filter(s=>s.status==='yes').length;
  document.getElementById('bn-maybe').textContent=sv.filter(s=>s.status==='maybe').length;
  document.getElementById('bn-pending').textContent=UD.length+LD.length-sv.filter(s=>s.status).length;
}

function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

document.querySelectorAll('.lbtn').forEach(b=>{
  b.addEventListener('click',()=>{
    const tier=b.dataset.tier;
    if(activeTiers.has(tier)){activeTiers.delete(tier);b.classList.remove('on');}
    else{activeTiers.add(tier);b.classList.add('on');}
    makeMarkers();
  });
});

let touchStartY=0;
document.getElementById('detail-sheet').addEventListener('touchstart',e=>{touchStartY=e.touches[0].clientY;},{passive:true});
document.getElementById('detail-sheet').addEventListener('touchend',e=>{if(e.changedTouches[0].clientY-touchStartY>80)closeSheet();},{passive:true});

// Event delegation for YNM buttons
document.addEventListener('click', function(e) {
  var btn = e.target.closest('[data-action]');
  if(btn) setStatus(btn.getAttribute('data-action'));
});
